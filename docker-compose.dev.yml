services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dhm-dev-backend
    restart: unless-stopped

    env_file:
      - .env.dev
    environment:
      SITE_TRANSLATIONS_PATH: /app/landingpage/lang

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - ./landingpage/lang:/app/landingpage/lang

    ports:
      - "127.0.0.1:8001:8000"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15
    container_name: dhm-dev-postgres
    restart: unless-stopped

    env_file:
      - .env.dev

    volumes:
      - dhm_dev_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dhm_dev_postgres_data:
