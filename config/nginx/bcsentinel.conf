server {
    listen 80;
    server_name api.bcsentinel.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.bcsentinel.com;

    ssl_certificate /etc/letsencrypt/live/api.bcsentinel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bcsentinel.com/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location = /billing/webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location /admin/ {
        # Optional hardening:
        # allow 203.0.113.10;
        # deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }
}

server {
    listen 80;
    server_name bcsentinel.com www.bcsentinel.com dev.bcsentinel.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name bcsentinel.com www.bcsentinel.com dev.bcsentinel.com;

    # Certificate must cover bcsentinel.com, www.bcsentinel.com, and dev.bcsentinel.com.
    ssl_certificate /etc/letsencrypt/live/bcsentinel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bcsentinel.com/privkey.pem;

    root /var/www/bcsentinel/landingpage;
    index index.html;

    client_max_body_size 10m;

    location = /billing/webhook {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location ^~ /admin/ {
        # Optional hardening:
        # allow 203.0.113.10;
        # deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location ~ ^/(pricing|reports|license|scan|scans|analytics|billing|public|tenant|health|openapi\.json|redoc)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
